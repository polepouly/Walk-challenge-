<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f766e" />
  <title>Our Walk Challenge</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥾</text></svg>" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">🥾</span>
        <div>
          <h1 id="appTitle">Our Walk Challenge</h1>
          <p class="subtitle" id="participantLine">You vs. Wife</p>
        </div>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">⚙️</button>
    </header>

    <div id="banner"></div>
    <main id="app"></main>

    <footer class="foot">
      <p>Monthly step challenge · winner gets a ~<span id="budgetFoot">20</span> CHF surprise on Galaxus 🎁</p>
    </footer>
  </div>

  <!-- Settings modal -->
  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-head">
        <h2>Settings</h2>
        <button class="icon-btn" id="closeSettings" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="settingsBody"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
